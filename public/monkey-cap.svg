<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Main cap body - brown monkey cap -->
  <ellipse cx="200" cy="160" rx="190" ry="80" fill="#5C3A1E" opacity="0.95"/>
  
  <!-- Cap top dome -->
  <ellipse cx="200" cy="100" rx="160" ry="90" fill="#6B4423"/>
  
  <!-- Cap highlight/sheen -->
  <ellipse cx="160" cy="70" rx="70" ry="35" fill="#8B5E3C" opacity="0.4"/>
  
  <!-- Cap brim / visor - extends forward -->
  <path d="M 20 155 Q 200 210 380 155 Q 380 185 200 195 Q 20 185 20 155 Z" fill="#3E2108"/>
  
  <!-- Brim underside shadow -->
  <path d="M 40 158 Q 200 205 360 158 Q 360 178 200 188 Q 40 178 40 158 Z" fill="#2A1506" opacity="0.7"/>
  
  <!-- Ear flaps - left -->
  <path d="M 30 140 Q -10 160 10 200 Q 40 220 60 190 Q 50 165 30 140 Z" fill="#5C3A1E"/>
  <path d="M 32 145 Q 0 165 15 195 Q 38 210 55 185 Q 47 162 32 145 Z" fill="#8B5E3C" opacity="0.3"/>
  
  <!-- Ear flaps - right -->
  <path d="M 370 140 Q 410 160 390 200 Q 360 220 340 190 Q 350 165 370 140 Z" fill="#5C3A1E"/>
  <path d="M 368 145 Q 400 165 385 195 Q 362 210 345 185 Q 353 162 368 145 Z" fill="#8B5E3C" opacity="0.3"/>
  
  <!-- Monkey face details on the cap - small eyes -->
  <circle cx="175" cy="85" r="12" fill="#3E2108"/>
  <circle cx="225" cy="85" r="12" fill="#3E2108"/>
  <circle cx="173" cy="83" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="223" cy="83" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="175" cy="85" r="3" fill="#1a0a00"/>
  <circle cx="225" cy="85" r="3" fill="#1a0a00"/>
  
  <!-- Monkey snout area -->
  <ellipse cx="200" cy="115" rx="30" ry="20" fill="#8B5E3C" opacity="0.7"/>
  
  <!-- Nose -->
  <ellipse cx="195" cy="112" rx="5" ry="3" fill="#3E2108"/>
  <ellipse cx="205" cy="112" rx="5" ry="3" fill="#3E2108"/>
  
  <!-- Mouth/smile -->
  <path d="M 185 125 Q 200 135 215 125" stroke="#3E2108" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Cap strap/button on top -->
  <circle cx="200" cy="25" r="12" fill="#3E2108"/>
  <circle cx="200" cy="25" r="7" fill="#2A1506"/>
  
  <!-- Cap seam lines -->
  <path d="M 200 25 Q 150 60 100 120" stroke="#3E2108" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 200 25 Q 250 60 300 120" stroke="#3E2108" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 200 25 L 200 120" stroke="#3E2108" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Fuzzy texture lines -->
  <path d="M 80 90 Q 85 85 90 90" stroke="#8B5E3C" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 100 75 Q 105 70 110 75" stroke="#8B5E3C" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 290 90 Q 295 85 300 90" stroke="#8B5E3C" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 310 70 Q 315 65 320 70" stroke="#8B5E3C" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 150 50 Q 155 45 160 50" stroke="#8B5E3C" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 240 50 Q 245 45 250 50" stroke="#8B5E3C" stroke-width="1" fill="none" opacity="0.6"/>
</svg>
