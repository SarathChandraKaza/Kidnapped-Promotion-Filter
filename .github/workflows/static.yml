jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Clean install dependencies
        run: npm ci

      - name: Verify Vite exists
        run: ls -la node_modules/.bin | grep vite

      - name: Build project
        run: npm run build
